  <div class="enquire-modal-overlay" id="schedule-tour-modal" aria-hidden="true">
    <div class="enquire-modal-content" role="dialog" aria-labelledby="schedule-tour-modal-title" aria-modal="true">
      <button type="button" class="enquire-modal-close" aria-label="Close" id="schedule-tour-modal-close">&times;</button>
      <div class="enquire-modal-header">
        <h2 id="schedule-tour-modal-title">Schedule a Tour Today</h2>

      <form class="enquire-modal-form" id="schedule-tour-modal-form" novalidate>
        <div class="enquire-modal-row">
          <label class="enquire-modal-field">
            <span>First Name*</span>
            <input type="text" id="schedule-tour-fname" required autocomplete="given-name">

          <label class="enquire-modal-field">

        <div class="enquire-modal-row">
          <label class="enquire-modal-field">
            <span>Email*</span>
            <input type="email" id="schedule-tour-email" required autocomplete="email">
          </label>
          <label class="enquire-modal-field enquire-modal-field--phone">
            <span>Mobile* (Click flag to change country)</span>
            <div class="enquire-modal-phone">
              <div class="enquire-modal-phone-flag">
                <img src="https://flagcdn.com/w40/in.png" alt="India" width="22" height="16" id="schedule-tour-phone-flag" decoding="async">
                <select id="schedule-tour-phone-code" aria-label="Phone country code">
                  <option value="+91" data-flag="in" selected>India (+91)</option>
                  <option value="+971" data-flag="ae">UAE (+971)</option>
                  <option value="+1" data-flag="us">USA (+1)</option>
                  <option value="+44" data-flag="gb">UK (+44)</option>
                  <option value="+65" data-flag="sg">Singapore (+65)</option>
                  <option value="+61" data-flag="au">Australia (+61)</option>
                  <option value="+1" data-flag="ca">Canada (+1)</option>
                  <option value="+966" data-flag="sa">Saudi Arabia (+966)</option>
                  <option value="+974" data-flag="qa">Qatar (+974)</option>
                  <option value="+965" data-flag="kw">Kuwait (+965)</option>
                  <option value="+973" data-flag="bh">Bahrain (+973)</option>
                  <option value="+968" data-flag="om">Oman (+968)</option>
                  <option value="+49" data-flag="de">Germany (+49)</option>
                  <option value="+33" data-flag="fr">France (+33)</option>
                  <option value="+81" data-flag="jp">Japan (+81)</option>
                  <option value="+852" data-flag="hk">Hong Kong (+852)</option>
                  <option value="+27" data-flag="za">South Africa (+27)</option>
                  <option value="+234" data-flag="ng">Nigeria (+234)</option>
                </select>
              </div>
              <input type="tel" id="schedule-tour-phone" required autocomplete="tel-national">
            </div>
          </label>
        </div>
        <div class="enquire-modal-row">
          <label class="enquire-modal-field">
            <span>Select Date</span>
            <input type="date" id="schedule-tour-date">
          </label>
          <label class="enquire-modal-field">
            <span>Select Time</span>
            <select id="schedule-tour-time" aria-label="Select time">
              <option value="10:00 AM" selected>10:00 AM</option>
              <option value="11:00 AM">11:00 AM</option>
              <option value="12:00 PM">12:00 PM</option>
              <option value="1:00 PM">1:00 PM</option>
              <option value="2:00 PM">2:00 PM</option>
              <option value="3:00 PM">3:00 PM</option>
              <option value="4:00 PM">4:00 PM</option>
              <option value="5:00 PM">5:00 PM</option>
              <option value="6:00 PM">6:00 PM</option>
            </select>
          </label>
        </div>
        <label class="enquire-modal-field enquire-modal-field--full enquire-modal-field--half">
          <span>Select Project*</span>
          <select id="schedule-tour-project" required>
            <option value="" disabled selected>Select Project</option>
            <option value="Crown Residences at Godrej Golf Links">Crown Residences at Godrej Golf Links</option>
            <option value="Godrej Astra">Godrej Astra</option>
            <option value="Godrej Vanantara">Godrej Vanantara</option>
            <option value="Godrej Meridien">Godrej Meridien</option>
            <option value="Godrej Altus">Godrej Altus</option>
            <option value="Godrej Aveline">Godrej Aveline</option>
            <option value="Godrej Ivara">Godrej Ivara</option>
            <option value="Godrej Horizon">Godrej Horizon</option>
            <option value="Godrej Parkshire">Godrej Parkshire</option>
            <option value="Godrej Connaught One">Godrej Connaught One</option>
            <option value="Godrej Regal Pavilion">Godrej Regal Pavilion</option>
            <option value="Godrej Arden">Godrej Arden</option>
            <option value="Godrej Vrikshya">Godrej Vrikshya</option>
            <option value="Godrej Rejuve">Godrej Rejuve</option>
            <option value="Godrej Blue">Godrej Blue</option>
            <option value="Godrej South Estate">Godrej South Estate</option>
            <option value="Godrej Tiara">Godrej Tiara</option>
            <option value="Godrej Exquisite">Godrej Exquisite</option>
            <option value="Godrej Woodside Estate">Godrej Woodside Estate</option>
            <option value="Godrej Woodscapes">Godrej Woodscapes</option>
            <option value="Nexspace">Nexspace</option>
          </select>
        </label>
        <label class="enquire-modal-consent">
          <input type="checkbox" id="schedule-tour-consent" checked>
          <span>Yes, I would like to receive updates &amp; promotions from Godrej Properties Limited.</span>
        </label>
        <div class="enquire-modal-submit-wrap">
          <button type="submit" class="enquire-modal-submit">Submit</button>
        </div>
        <p class="enquire-modal-feedback" id="schedule-tour-modal-feedback" hidden></p>
      </form>
    </div>
  </div>
